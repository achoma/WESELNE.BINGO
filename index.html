<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow"> 
    <title>Szykuje się coś ekstra! | Strona w budowie</title>
    <style>
        :root {
            --bg-color: #fdfbf7;
            --text-color: #c99999;
            --font-main: 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            height: 100%;
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .maintenance-container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
            animation: fadeIn 1.2s ease-in-out;
        }

        .logo-wrapper {
            margin-bottom: 2.5rem;
        }

        .logo-wrapper img {
            max-width: 380px;
            height: auto;
            display: inline-block;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            line-height: 1.3;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            color: rgb(83, 83, 83);
            letter-spacing: 0.01em;
        }
        span{
            font-size: 1.1rem;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.75rem;
            }

            p {
                font-size: 1rem;
            }

            .logo-wrapper img {
                max-width: 180px;
            }
        }
    </style>
</head>

<body>

    <b class="maintenance-container">

        <div class="logo-wrapper">
            <img src="/images/weselne.bingo.png" alt="Logo" >
        </div>

        <h1>Premiera wkrótce</h1>
    <p>Cyfrowa alternatywa dla tradycyjnych zabaw. </p>
    <p>
        Subtelna integracja, nowoczesny design i zero kompromisów. </p><p>Tworzymy interaktywne gry online dla najbardziej
    wymagających gości. </p><br>
    <span><b>Trwają prace deweloperskie.</b></span>
    </main>

</body>

</html>
